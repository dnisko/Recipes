<app-paginated-list [isLoading]="isLoading" [pagination]="pagination">
  <!-- Loading State -->
  @if (isLoading) {
    <div class="loading-state">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  }

  <!-- Categories Table -->
  @if (!isLoading && items.length > 0) {
    <table class="category-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (category of items; track category) {
          <tr>
            <td>{{ category.id }}</td>
            <td>{{ category.name }}</td>
            <td class="actions">
              <a
                mat-raised-button
                color="primary"
                [routerLink]="['/categories/edit', category.id]"
                class="action-btn"
                >
                Edit
              </a>
              <button
                mat-raised-button
                color="warn"
                (click)="confirmDelete(category.id)"
                class="action-btn"
                >
                Delete
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }

  <!-- Empty State -->
  @if (!isLoading && items.length === 0) {
    <div class="empty-state">
      <mat-icon>category</mat-icon>
      <h3>No Categories Found</h3>
      <p>Start by adding your first category</p>
      <a mat-raised-button color="primary" routerLink="/categories/add">
        Add Category
      </a>
    </div>
  }
</app-paginated-list>
