<div class="card-container">
  @if (loading) {
    <div class="loading">Loading categories...</div>
  }
  @if (error) {
    <div class="error">{{ error }}</div>
  }

  @if (!loading && !error && categories.length) {
    <ul class="card-grid">
      @for (category of categories; track category) {
        <li class="card">
          <strong>{{ category.name }}</strong>
        </li>
      }
    </ul>
  }

  @if (!loading && !error && !categories.length) {
    <div class="empty">
      No categories found.
    </div>
  }
</div>
